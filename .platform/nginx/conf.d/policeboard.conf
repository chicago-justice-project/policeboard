# Policeboard nginx tweaks on AL2023. The platform's stock config already
# proxies to Puma — this fragment only adds what the app needs beyond that.
client_max_body_size 20M;

location /assets {
  alias /var/app/current/public/assets;
  gzip_static on;
  gzip on;
  expires max;
  add_header Cache-Control public;
}

location /public {
  alias /var/app/current/public;
  gzip_static on;
  gzip on;
  expires max;
  add_header Cache-Control public;
}
